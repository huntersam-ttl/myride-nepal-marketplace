<svg width="220" height="40" viewBox="0 0 220 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title-white logo-desc-white">
  <title id="logo-title-white">MyRideNepal</title>
  <desc id="logo-desc-white">MyRideNepal marketplace logo (white variant for dark backgrounds)</desc>

  <style>
    .logo-pin-w {
      transform-origin: center;
      animation: mrnPinDropW 700ms cubic-bezier(.2, .9, .2, 1.15) 180ms both;
    }
    @keyframes mrnPinDropW {
      0%   { transform: translateY(-5px) scale(0.96); opacity: 0; }
      65%  { transform: translateY(1px) scale(1.03); opacity: 1; }
      100% { transform: translateY(0) scale(1);     opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .logo-pin-w { animation: none; }
    }
  </style>

  <!-- White M Shape -->
  <path d="M 2 30 L 2 10 L 14 22 L 26 10 L 26 30 L 22 30 L 22 16 L 14 26 L 6 16 L 6 30 Z" fill="#FFFFFF"/>

  <!-- Subtle dark route between M peaks -->
  <path d="M 11 19 L 14 23 L 17 19 L 14 15 Z" fill="#0B1D3A" opacity="0.5"/>

  <!-- Premium Orange Location Pin -->
  <g class="logo-pin-w" transform="translate(14, 7)">
    <path d="M 0 0 C 2.2 0 4 1.8 4 4 C 4 6 0 10 0 10 C 0 10 -4 6 -4 4 C -4 1.8 -2.2 0 0 0 Z" fill="#FF6A00"/>
    <circle cx="0" cy="3.5" r="1.8" fill="#FFFFFF"/>
  </g>

  <!-- White Wordmark -->
  <text x="38" y="26" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">
    MyRideNepal
  </text>
</svg>
